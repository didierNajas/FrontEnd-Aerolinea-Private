<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Aerolinea</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230f172a'/%3E%3Cpath d='M12 40l10-8h10l-8 14h8l12-18 10 8 8-4-6-10-18 10-12-10-8 4z' fill='%234f8cff'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell auth-page">
      <div class="auth-card">
        <div class="brand" style="margin-bottom: 24px; gap: 16px;">
          <div class="brand-icon">✈</div>
          <div>
            <h1>Regístrate</h1>
            <p class="muted">Crea tu cuenta para acceder a reservas y soporte.</p>
          </div>
        </div>

        <form id="registerForm" class="form-grid">
          <label>Nombre completo<input name="name" required /></label>
          <label>Correo electrónico<input name="email" type="email" required /></label>
          <label>Contraseña<input name="password" type="password" required minlength="6" /></label>
          <label>Confirmar contraseña<input name="confirmPassword" type="password" required minlength="6" /></label>
          <div class="flex-actions" style="justify-content: stretch;">
            <button type="submit" class="primary-btn">Crear cuenta</button>
          </div>
          <div id="registerAlert"></div>
        </form>

        <p class="auth-alt">
          ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </p>
      </div>
    </div>

    <script type="module" src="js/controllers/authController.js"></script>
  </body>
</html>
