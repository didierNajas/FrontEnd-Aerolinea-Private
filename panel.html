<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel - Aerolínea</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230f172a'/%3E%3Cpath d='M12 40l10-8h10l-8 14h8l12-18 10 8 8-4-6-10-18 10-12-10-8 4z' fill='%234f8cff'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon" onclick="window.location.href='index.html'">✈</div>
          <div>
          <div>
            <h1>Aerolínea</h1>
            <p>Panel de control</p>
          </div>
        </div>

        <nav class="nav-links">
          <button class="nav-btn active" data-view="pasajeros">Pasajeros</button>
          <button class="nav-btn" data-view="vuelos">Vuelos</button>
          <button class="nav-btn" data-view="reservas">Reservas</button>
          <button class="nav-btn" data-view="noticias">Comunicaciones</button>
        </nav>

        <div class="sidebar-card">
          <h3>Estado del sistema</h3>
          <p>Conexión con API REST activa</p>
          <span class="status-pill">Operativo</span>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Panel administrativo</p>
            <h2 id="viewTitle">Pasajeros</h2>
          </div>
          <div class="topbar-actions">
            <button id="refreshBtn" class="secondary-btn">Actualizar</button>
            <button id="logoutBtn" class="ghost-btn">Cerrar sesión</button>
          </div>
        </header>

        <section id="overviewGrid" class="overview-grid"></section>
        <section id="viewContainer" class="view-container"></section>
      </main>
    </div>

    <script type="module" src="js/panelGuard.js"></script>
    <script type="module" src="js/controllers/panelController.js"></script>
  </body>
</html>
