<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel - Aerolínea</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230f172a'/%3E%3Cpath d='M12 40l10-8h10l-8 14h8l12-18 10 8 8-4-6-10-18 10-12-10-8 4z' fill='%234f8cff'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell panel-shell">

      <!-- Sidebar -->
      <aside class="sidebar panel-sidebar" id="panelSidebar">
        <div class="sidebar-header">
          <a href="index.html" class="brand sidebar-brand">
            <div class="brand-icon">✈</div>
            <div>
              <h1>Aerolínea</h1>
              <p>Panel de control</p>
            </div>
          </a>
          <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Cerrar menú">✕</button>
        </div>

        <nav class="sidebar-nav-section">
          <p class="sidebar-section-label">Gestión</p>
          <button class="nav-btn active" data-view="pasajeros">
            <span class="nav-icon">👤</span> Pasajeros
          </button>
          <button class="nav-btn" data-view="vuelos">
            <span class="nav-icon">✈</span> Vuelos
          </button>
          <button class="nav-btn" data-view="reservas">
            <span class="nav-icon">🎫</span> Reservas
          </button>
        </nav>

        <nav class="sidebar-nav-section">
          <p class="sidebar-section-label">Configuración</p>
          <button class="nav-btn" data-view="noticias">
            <span class="nav-icon">📢</span> Comunicaciones
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-status-card">
            <span class="sidebar-status-dot"></span>
            <div>
              <strong>Sistema operativo</strong>
              <p>API REST conectada</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- Overlay mobile -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Main content -->
      <div class="panel-body">

        <!-- Top bar -->
        <header class="panel-topbar">
          <div class="panel-topbar-left">
            <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="Abrir menú">☰</button>
            <div>
              <p class="eyebrow" id="viewBreadcrumb">Panel administrativo</p>
              <h2 id="viewTitle">Pasajeros</h2>
            </div>
          </div>
          <div class="panel-topbar-right">
            <button id="refreshBtn" class="secondary-btn">↺ Actualizar</button>
            <button id="logoutBtn" class="ghost-btn">Cerrar sesión</button>
          </div>
        </header>

        <!-- Overview stats -->
        <section id="overviewGrid" class="panel-overview"></section>

        <!-- View area -->
        <section id="viewContainer" class="panel-view-container"></section>

      </div>
    </div>

    <script type="module" src="js/panelGuard.js"></script>
    <script type="module" src="js/controllers/panelController.js"></script>
    <script>
      // Sidebar toggle for mobile
      const sidebar = document.getElementById('panelSidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const toggleBtn = document.getElementById('sidebarToggleBtn');
      const closeBtn = document.getElementById('sidebarCloseBtn');

      function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('active');
      }
      function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
      }

      toggleBtn.addEventListener('click', openSidebar);
      closeBtn.addEventListener('click', closeSidebar);
      overlay.addEventListener('click', closeSidebar);
    </script>
  </body>
</html>
